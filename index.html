<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Numerical Differentiation Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h2>Dashboard</h2>

<a href="index.html">🏠 Home</a>
<a href="theory.html">📚 Theory</a>
<a href="tutorial.html">🎓 Tutorial</a>
<a href="about.html">ℹ About</a>

</div>

<div class="main">

<h1>Numerical Differentiation Calculator</h1>

<div class="card-box">

<h4>Input Panel</h4>

<input type="text"
id="function"
class="form-control mb-3"
placeholder="Example: x^3 + 2*x">

<input type="number"
id="xvalue"
class="form-control mb-3"
placeholder="Enter x value">

<input type="number"
id="hvalue"
class="form-control mb-3"
value="0.01">

<select
id="method"
class="form-select mb-3">

<option value="forward">
Forward Difference
</option>

<option value="backward">
Backward Difference
</option>

<option value="central">
Central Difference
</option>

<option value="divided">
Divided Difference
</option>

</select>

<button
class="btn btn-primary w-100"
onclick="calculate()">
Calculate
</button>

</div>

<div class="row mt-4">

<div class="col-md-3">
<div class="kpi">
<h6>Derivative</h6>
<h4 id="derivativeCard">0</h4>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<h6>Exact Value</h6>
<h4 id="exactCard">0</h4>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<h6>Error</h6>
<h4 id="errorCard">0</h4>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<h6>Method</h6>
<h4 id="methodCard">-</h4>
</div>
</div>

</div>

<div class="card-box mt-4">
<h4>Function Graph</h4>
<div id="functionGraph"></div>
</div>

<div class="card-box mt-4">
<h4>Error vs Step Size</h4>
<div id="errorGraph"></div>
</div>

<div class="card-box mt-4">

<h4>Method Comparison</h4>

<table class="table table-dark">

<thead>
<tr>
<th>Method</th>
<th>Derivative</th>
<th>Error</th>
</tr>
</thead>

<tbody id="comparisonBody">
</tbody>

</table>

</div>

<!-- Export & Sharing -->

<div class="card-box mt-4">

<h3>Export & Sharing</h3>

<button
class="btn btn-success"
onclick="exportPDF()">

Export PDF

</button>

<button
class="btn btn-info"
onclick="downloadGraph()">

Download Graph PNG

</button>

</div>

</div>

</div>

<script src="js/app.js"></script>
<script src="js/export.js"></script>

</body>
</html>
